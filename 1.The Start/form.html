<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <form action="/server">
        <div>
            <label for="user">Username:</label>
            <input type="text" name="Username" id="user">
        </div>
        <div>
            <label for="pass">Password:</label>
            <input type="password" name="Password" id="pass">
        </div>
        <div>
            <label for="Time">Select Time</label>
            <input type="time" name="" id="Time">
        </div>
        <button>Submit</button>
        <button type="button">Hello</button>
        <button type="reset">Reset</button>
        <input type="button" value="Click me!">
    </form>
    <hr>
    <form action="https://www.youtube.com/results?">
        <input type="text" name="search_query" id="search" placeholder="Search on Youtube">
        <button>Submit</button>
    </form>
    <hr>
    <form action="">
        <input type="checkbox" name="age" id="age1">
        <label for="age1">I am 18+</label>
        <input type="checkbox" name="age" id="age2">
        <label for="age2">I am below 18</label>
        <input type="radio" name="gender" id="gender" value="Male">
        <label for="gender">Male</label>
        <input type="radio" name="gender" id="gender" value="Female">
        <label for="gender">Female</label>
    </form>

</body>

</html>
