<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Food</h1>
    <h2>Healthy</h2>
    <ul>
        <li>Egg</li>
        <li>Chiken</li>
        <li>Vegetables</li>
    </ul>
    <h2>junk Food</h2>
    <ol type="A">
        <li>Burger</li>
        <li>Pizza</li>
        <li>Samosa</li>
    </ol>
    <dl>
        <dt>Noun</dt>
        <dd>Noun is the name of anything.</dd>
    </dl>
</body>
</html>
